<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空心壳体模型 - 长方体+半圆柱 (双封闭壳体)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        canvas {
            display: block;
        }

        #ui {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            color: #e0e0e0;
            pointer-events: none;
        }
        #ui>* {
            pointer-events: auto;
        }

        .panel {
            background: rgba(20, 20, 40, 0.88);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
            min-width: 230px;
        }

        .panel h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            font-weight: 600;
            color: #7cb3f0;
            letter-spacing: 0.3px;
        }
        .panel p {
            margin: 4px 0;
            font-size: 12px;
            line-height: 1.7;
            color: #bbb;
        }
        .panel label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            margin: 6px 0;
            cursor: pointer;
            color: #ccc;
            user-select: none;
        }
        .panel input[type="checkbox"] {
            accent-color: #7cb3f0;
            width: 15px;
            height: 15px;
            cursor: pointer;
        }
        .tag {
            display: inline-block;
            background: rgba(124, 179, 240, 0.15);
            color: #7cb3f0;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 4px;
            font-weight: 500;
        }
        .tag-warm {
            background: rgba(240, 180, 140, 0.15);
            color: #e8a870;
        }
        .panel button {
            width: 100%;
            padding: 9px;
            margin-top: 10px;
            background: #7cb3f0;
            border: none;
            border-radius: 7px;
            color: #1a1a2e;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 0.3px;
            transition: background 0.2s, transform 0.1s;
        }
        .panel button:hover {
            background: #9cc8f5;
            transform: translateY(-1px);
        }
        .panel button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="panel">
            <h3>📐 双封闭空心壳体</h3>
            <p><span class="tag">长方体</span>120×120×40 mm · 壁厚2mm</p>
            <p><span class="tag-warm">半圆柱</span>φ120×120 mm · 高60mm · 壁厚2mm</p>
            <p style="color:#aaa;font-size:11px;margin-top:6px;">
                ✅ 长方体<b>顶部完全封闭</b> · 半圆柱<b>底面+两端封闭</b>
            </p>
            <p style="color:#888;font-size:10px;">两个壳体各自独立封闭，内部空腔不连通</p>
        </div>
        <div class="panel">
            <h3>⚙️ 显示控制</h3>
            <label><input type="checkbox" id="cbTransparent" checked> 透明显示</label>
            <label><input type="checkbox" id="cbWireframe"> 线框模式</label>
            <label><input type="checkbox" id="cbAutoRotate" checked> 自动旋转</label>
            <label><input type="checkbox" id="cbEdges" checked> 显示边线</label>
            <label><input type="checkbox" id="cbCutaway"> 剖切视图 (Z轴中切)</label>
            <button id="btnExport">📥 导出 STL</button>
            <p style="margin-top:10px;color:#666;font-size:11px">🖱️ 拖拽旋转 · 滚轮缩放 · 右键平移</p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { STLExporter } from 'three/addons/exporters/STLExporter.js';

        // ─── Scene ───────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.0012);

        // ─── Camera ──────────────────────────────────────────────────────
        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 2000);
        camera.position.set(260, 190, 280);

        // ─── Renderer ────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        renderer.localClippingEnabled = true;
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // ─── Controls ────────────────────────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.target.set(0, 28, 0);
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.3;
        controls.minDistance = 100;
        controls.maxDistance = 800;
        controls.maxPolarAngle = Math.PI * 0.75;

        // ─── Lighting ────────────────────────────────────────────────────
        scene.add(new THREE.AmbientLight(0x404068, 1.6));
        const keyLight = new THREE.DirectionalLight(0xfff0e0, 2.2);
        keyLight.position.set(120, 200, 160);
        scene.add(keyLight);
        const fillLight = new THREE.DirectionalLight(0x8899cc, 0.9);
        fillLight.position.set(-140, 70, -100);
        scene.add(fillLight);
        const rimLight = new THREE.DirectionalLight(0x5588cc, 0.7);
        rimLight.position.set(0, -40, 200);
        scene.add(rimLight);
        const topLight = new THREE.DirectionalLight(0xffffff, 0.5);
        topLight.position.set(0, 180, 20);
        scene.add(topLight);
        const cavityLight = new THREE.PointLight(0xfff4e0, 1.8, 350, 1.5);
        cavityLight.position.set(0, 30, 0);
        scene.add(cavityLight);

        // ─── Clipping Plane ─────────────────────────────────────────────
        const clipPlane = new THREE.Plane(new THREE.Vector3(0, 0, -1), 0);

        // ─── Materials ───────────────────────────────────────────────────
        // 长方体材质 - 蓝灰色
        const boxShellMat = new THREE.MeshPhysicalMaterial({
            color: 0x5a8db8,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.42,
            roughness: 0.32,
            metalness: 0.06,
            clearcoat: 0.35,
            clearcoatRoughness: 0.18,
            depthWrite: false,
            clippingPlanes: [],
        });

        // 半圆柱材质 - 暖铜灰色
        const scShellMat = new THREE.MeshPhysicalMaterial({
            color: 0xb89378,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.42,
            roughness: 0.32,
            metalness: 0.06,
            clearcoat: 0.35,
            clearcoatRoughness: 0.18,
            depthWrite: false,
            clippingPlanes: [],
        });

        const boxEdgeMat = new THREE.LineBasicMaterial({
            color: 0x7aafdd,
            transparent: true,
            opacity: 0.55,
            clippingPlanes: [],
        });

        const scEdgeMat = new THREE.LineBasicMaterial({
            color: 0xd4a888,
            transparent: true,
            opacity: 0.55,
            clippingPlanes: [],
        });

        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x222233,
            roughness: 0.8,
            metalness: 0.2,
            clippingPlanes: [],
        });

        // ─── Track all objects ───────────────────────────────────────────
        const allShellMeshes = [];
        const boxEdgeObjects = [];
        const scEdgeObjects = [];
        const allMaterials = [boxShellMat, scShellMat, boxEdgeMat, scEdgeMat, groundMat];

        // ─── Parameters ──────────────────────────────────────────────────
        const T = 2; // 壁厚
        const BW = 120,
            BD = 120,
            BH = 40; // 长方体：宽×深×高
        const SCR = 60; // 半圆柱外半径
        const SCIR = SCR - T; // 半圆柱内半径 = 58
        const SCL = 120; // 半圆柱长度(沿Z轴)
        const wallH = BH - 2 * T; // 长方体侧壁高度 = 36

        // ─── Helper: add a shell part ────────────────────────────────────
        function addBoxPart(geometry, position, rotation, parent) {
            const mesh = new THREE.Mesh(geometry, boxShellMat);
            if (position) mesh.position.copy(position);
            if (rotation) {
                mesh.rotation.x = rotation.x || 0;
                mesh.rotation.y = rotation.y || 0;
                mesh.rotation.z = rotation.z || 0;
            }
            parent.add(mesh);
            allShellMeshes.push(mesh);

            const edgeGeo = new THREE.EdgesGeometry(geometry, 20);
            const edges = new THREE.LineSegments(edgeGeo, boxEdgeMat);
            if (position) edges.position.copy(position);
            if (rotation) {
                edges.rotation.x = rotation.x || 0;
                edges.rotation.y = rotation.y || 0;
                edges.rotation.z = rotation.z || 0;
            }
            parent.add(edges);
            boxEdgeObjects.push(edges);
            return mesh;
        }

        function addSCPart(geometry, position, rotation, parent, addEdges = true) {
            const mesh = new THREE.Mesh(geometry, scShellMat);
            if (position) mesh.position.copy(position);
            if (rotation) {
                mesh.rotation.x = rotation.x || 0;
                mesh.rotation.y = rotation.y || 0;
                mesh.rotation.z = rotation.z || 0;
            }
            parent.add(mesh);
            allShellMeshes.push(mesh);

            if (addEdges) {
                const edgeGeo = new THREE.EdgesGeometry(geometry, 20);
                const edges = new THREE.LineSegments(edgeGeo, scEdgeMat);
                if (position) edges.position.copy(position);
                if (rotation) {
                    edges.rotation.x = rotation.x || 0;
                    edges.rotation.y = rotation.y || 0;
                    edges.rotation.z = rotation.z || 0;
                }
                parent.add(edges);
                scEdgeObjects.push(edges);
            }
            return mesh;
        }

        // ══════════════════════════════════════════════════════════════════
        //  BUILD: 长方体封闭壳体 (Box Shell) - 完全封闭，顶部无开口
        // ══════════════════════════════════════════════════════════════════
        const boxGroup = new THREE.Group();
        boxGroup.name = 'BoxShell';

        // 底板
        addBoxPart(
            new THREE.BoxGeometry(BW, T, BD),
            new THREE.Vector3(0, -BH / 2 + T / 2, 0),
            null,
            boxGroup
        );

        // 顶板 - 完整封闭（无开口）
        addBoxPart(
            new THREE.BoxGeometry(BW, T, BD),
            new THREE.Vector3(0, BH / 2 - T / 2, 0),
            null,
            boxGroup
        );

        // 前板
        addBoxPart(
            new THREE.BoxGeometry(BW, wallH, T),
            new THREE.Vector3(0, 0, BD / 2 - T / 2),
            null,
            boxGroup
        );

        // 后板
        addBoxPart(
            new THREE.BoxGeometry(BW, wallH, T),
            new THREE.Vector3(0, 0, -BD / 2 + T / 2),
            null,
            boxGroup
        );

        // 左板
        addBoxPart(
            new THREE.BoxGeometry(T, wallH, BD - 2 * T),
            new THREE.Vector3(-BW / 2 + T / 2, 0, 0),
            null,
            boxGroup
        );

        // 右板
        addBoxPart(
            new THREE.BoxGeometry(T, wallH, BD - 2 * T),
            new THREE.Vector3(BW / 2 - T / 2, 0, 0),
            null,
            boxGroup
        );

        scene.add(boxGroup);

        // ══════════════════════════════════════════════════════════════════
        //  BUILD: 半圆柱封闭壳体 (Semi-Cylinder Shell) - 完全封闭
        //  曲面壁 + 两端端盖 + 底面平板
        // ══════════════════════════════════════════════════════════════════
        const scGroup = new THREE.Group();
        scGroup.name = 'SemiCylinderShell';

        // 半圆环截面Shape（外半径60，内半径58，上半部分）
        const ringShape = new THREE.Shape();
        ringShape.moveTo(SCR, 0);
        ringShape.absarc(0, 0, SCR, 0, Math.PI, false); // 外半圆（逆时针）
        ringShape.lineTo(-SCIR, 0);
        ringShape.absarc(0, 0, SCIR, Math.PI, 0, true); // 内半圆（顺时针返回）
        ringShape.closePath();

        // 1) 曲面壁：半圆环截面沿Z轴拉伸120mm
        const extrudeSettings = { steps: 1, depth: SCL, bevelEnabled: false };
        const scWallGeo = new THREE.ExtrudeGeometry(ringShape, extrudeSettings);
        scWallGeo.translate(0, 0, -SCL / 2); // Z轴居中

        addSCPart(scWallGeo, new THREE.Vector3(0, 0, 0), null, scGroup, true);

        // 2) 前端盖 (z = +SCL/2 = +60)，面朝+z
        const capGeoFront = new THREE.ShapeGeometry(ringShape);
        addSCPart(capGeoFront, new THREE.Vector3(0, 0, SCL / 2), null, scGroup, true);

        // 3) 后端盖 (z = -SCL/2 = -60)，面朝-z
        const capGeoBack = new THREE.ShapeGeometry(ringShape);
        addSCPart(capGeoBack, new THREE.Vector3(0, 0, -SCL / 2), { x: 0, y: Math.PI, z: 0 }, scGroup, true);

        // 4) 底面平板：120×2×120，封闭半圆柱的平直底面
        //    上表面在局部y=0，中心在y=-1
        const bottomPlateGeo = new THREE.BoxGeometry(2 * SCR, T, SCL); // 120×2×120
        addSCPart(bottomPlateGeo, new THREE.Vector3(0, -T / 2, 0), null, scGroup, true);

        // 将半圆柱组放置在长方体顶部
        // 半圆柱底面平板上表面在局部y=0，世界y=BH/2=20
        // 底面平板下表面在局部y=-2，世界y=18
        // 长方体顶板上表面在y=20，下表面在y=18
        // → 底面平板与长方体顶板完全重合，两个壳体紧密贴合
        scGroup.position.set(0, BH / 2, 0);

        scene.add(scGroup);

        // ══════════════════════════════════════════════════════════════════
        //  Ground & Grid
        // ══════════════════════════════════════════════════════════════════
        const groundGeo = new THREE.PlaneGeometry(600, 600);
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -BH / 2 - 2;
        ground.name = 'Ground';
        scene.add(ground);

        const grid = new THREE.GridHelper(600, 60, 0x334455, 0x222244);
        grid.position.y = -BH / 2 - 1.9;
        grid.name = 'Grid';
        scene.add(grid);

        // ─── Dimension Labels (使用sprite标记关键尺寸) ──────────────────
        function createLabel(text, position, colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = colorHex || '#ffffff';
            ctx.font = 'bold 22px "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 128, 32);
            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            const spriteMat = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                opacity: 0.8,
                depthTest: false,
                depthWrite: false,
            });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.position.copy(position);
            sprite.scale.set(50, 12.5, 1);
            return sprite;
        }

        const labelBox = createLabel('120×120×40', new THREE.Vector3(0, -BH / 2 - 16, BD / 2 + 20), '#7cb3f0');
        const labelSC = createLabel('φ120×60', new THREE.Vector3(0, BH / 2 + SCR + 14, SCL / 2 + 20), '#e8a870');
        scene.add(labelBox);
        scene.add(labelSC);

        // ══════════════════════════════════════════════════════════════════
        //  UI Handlers
        // ══════════════════════════════════════════════════════════════════
        const cbTransparent = document.getElementById('cbTransparent');
        const cbWireframe = document.getElementById('cbWireframe');
        const cbAutoRotate = document.getElementById('cbAutoRotate');
        const cbEdges = document.getElementById('cbEdges');
        const cbCutaway = document.getElementById('cbCutaway');
        const btnExport = document.getElementById('btnExport');

        cbTransparent.addEventListener('change', (e) => {
            const isTransparent = e.target.checked;
            [boxShellMat, scShellMat].forEach((mat) => {
                mat.transparent = isTransparent;
                mat.opacity = isTransparent ? 0.42 : 0.95;
                mat.depthWrite = !isTransparent;
                mat.needsUpdate = true;
            });
        });

        cbWireframe.addEventListener('change', (e) => {
            const wf = e.target.checked;
            boxShellMat.wireframe = wf;
            scShellMat.wireframe = wf;
            boxShellMat.needsUpdate = true;
            scShellMat.needsUpdate = true;
        });

        cbAutoRotate.addEventListener('change', (e) => {
            controls.autoRotate = e.target.checked;
        });

        cbEdges.addEventListener('change', (e) => {
            const visible = e.target.checked;
            boxEdgeObjects.forEach((obj) => (obj.visible = visible));
            scEdgeObjects.forEach((obj) => (obj.visible = visible));
        });

        cbCutaway.addEventListener('change', (e) => {
            const planes = e.target.checked ? [clipPlane] : [];
            boxShellMat.clippingPlanes = planes;
            scShellMat.clippingPlanes = planes;
            boxEdgeMat.clippingPlanes = planes;
            scEdgeMat.clippingPlanes = planes;
            groundMat.clippingPlanes = planes;
            boxShellMat.needsUpdate = true;
            scShellMat.needsUpdate = true;
        });

        btnExport.addEventListener('click', () => {
            const exportGroup = new THREE.Group();
            exportGroup.name = 'HollowShells_Export';

            // 导出长方体壳体
            const boxClone = new THREE.Group();
            boxClone.name = 'BoxShell';
            allShellMeshes.forEach((mesh) => {
                if (mesh.parent === boxGroup || boxGroup.children.includes(mesh)) {
                    // 检查mesh是否属于boxGroup
                }
            });
            // 更稳健的方式：遍历boxGroup的子节点
            boxGroup.traverse((child) => {
                if (child.isMesh && child.material === boxShellMat) {
                    boxClone.add(child.clone());
                }
            });

            // 导出半圆柱壳体
            const scClone = new THREE.Group();
            scClone.name = 'SemiCylinderShell';
            scGroup.traverse((child) => {
                if (child.isMesh && child.material === scShellMat) {
                    scClone.add(child.clone());
                }
            });

            exportGroup.add(boxClone);
            exportGroup.add(scClone);

            const exporter = new STLExporter();
            const stlString = exporter.parse(exportGroup, { binary: false });
            const blob = new Blob([stlString], { type: 'application/sla' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'double_closed_shells.stl';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);

            // 清理
            exportGroup.clear();
            boxClone.clear();
            scClone.clear();
        });

        // ══════════════════════════════════════════════════════════════════
        //  Animation Loop
        // ══════════════════════════════════════════════════════════════════
        const clock = new THREE.Clock();
        let elapsedTotal = 0;

        function animate(timestamp) {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);
            elapsedTotal += dt;

            controls.update();

            // 微妙的呼吸式光照变化
            const breathe = 1 + Math.sin(elapsedTotal * 0.4) * 0.04;
            cavityLight.intensity = 1.8 * breathe;

            renderer.render(scene, camera);
        }

        requestAnimationFrame(animate);

        // ─── Resize Handler ──────────────────────────────────────────────
        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        // ─── Keyboard Shortcuts ──────────────────────────────────────────
        addEventListener('keydown', (e) => {
            switch (e.key.toLowerCase()) {
                case 't':
                    cbTransparent.checked = !cbTransparent.checked;
                    cbTransparent.dispatchEvent(new Event('change'));
                    break;
                case 'w':
                    cbWireframe.checked = !cbWireframe.checked;
                    cbWireframe.dispatchEvent(new Event('change'));
                    break;
                case 'r':
                    cbAutoRotate.checked = !cbAutoRotate.checked;
                    cbAutoRotate.dispatchEvent(new Event('change'));
                    break;
                case 'e':
                    cbEdges.checked = !cbEdges.checked;
                    cbEdges.dispatchEvent(new Event('change'));
                    break;
                case 'c':
                    cbCutaway.checked = !cbCutaway.checked;
                    cbCutaway.dispatchEvent(new Event('change'));
                    break;
                case 'f':
                    // 重置视角
                    camera.position.set(260, 190, 280);
                    controls.target.set(0, 28, 0);
                    controls.update();
                    break;
                default:
                    break;
            }
        });

        console.log('✅ 双封闭空心壳体模型已就绪');
        console.log('  📦 长方体壳体: 120×120×40mm, 壁厚2mm, 完全封闭');
        console.log('  🏛️ 半圆柱壳体: φ120×60mm, 长度120mm, 壁厚2mm, 完全封闭');
        console.log('  ⌨️ 快捷键: T=透明 W=线框 R=旋转 E=边线 C=剖切 F=重置视角');
    </script>
</body>
</html>

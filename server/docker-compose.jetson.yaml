version: '3.8'

services:
  srs:
    image: registry.cn-hangzhou.aliyuncs.com/ossrs/srs:5
    container_name: srs
    ports:
      - "1935:1935"
      - "1985:1985"
      - "8081:8080"
    stdin_open: true
    tty: true
    restart: unless-stopped

  app:
    build: .
    container_name: video-api
    ports:
      - "28001:28001"
    environment:
      # 如果 app 需要读取流，建议指向 SRS 的 RTMP/HTTP-FLV 地址
      - RTSP_URL=rtmp://srs:1935/live/livestream 
      - INFER_URL=http://116.238.240.2:31676/packet
    volumes:
      - ./:/app
    depends_on:
      - srs
    restart: unless-stopped

  ffmpeg-stream:
    image: linuxserver/ffmpeg
    container_name: ffmpeg-stream
    # 【关键】映射所有可能的视频设备，或者只映射变量指定的那个
    # 为了简单起见，这里映射两个常用设备，容器内根据变量选择使用哪一个
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
    
    # 【关键】使用环境变量传入配置
    environment:
      # 默认使用板载摄像头 (/dev/video0)
      # 如果要切换为 USB 摄像头，将此值改为 /dev/video1
      - CAMERA_DEVICE=${CAMERA_DEVICE:-/dev/video0}
      
      # 输入格式：板载通常用 mjpeg 或 yuyv422，USB 通常自动协商或用 mjpeg
      - INPUT_FORMAT=${INPUT_FORMAT:-mjpeg}
      
      # 分辨率
      - VIDEO_SIZE=${VIDEO_SIZE:-1920x1080}
      
      # 帧率
      - FRAMERATE=${FRAMERATE:-30}

    command:
      - "-f"
      - "v4l2"
      - "-input_format"
      - "${INPUT_FORMAT:-mjpeg}"
      - "-video_size"
      - "${VIDEO_SIZE:-1920x1080}"
      - "-framerate"
      - "${FRAMERATE:-30}"
      - "-i"
      - "${CAMERA_DEVICE:-/dev/video0}"  # <--- 这里使用变量
      - "-c:v"
      - "libx264"
      - "-preset"
      - "fast"
      - "-tune"
      - "zerolatency"
      - "-b:v"
      - "4M"
      - "-c:a"
      - "aac"
      - "-b:a"
      - "128k"
      - "-f"
      - "flv"
      - "-muxdelay"
      - "0"
      - "-muxpreload"
      - "0"
      - "rtmp://srs:1935/live/livestream"
    
    depends_on:
      - srs
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  frontend-dev:
    image: node:22
    container_name: video-frontend-dev
    working_dir: /app
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "4173:4173"
    environment:
      - VITE_STREAM_URL=http://192.168.152.6:8081/live/livestream.flv
      - VITE_API_HOST=http://192.168.152.6:28001
    command: ["/bin/sh", "-c", "npm config set registry https://registry.npmmirror.com && npm install && npm run dev -- --host 0.0.0.0"]
    stdin_open: true
    tty: true
    restart: unless-stopped
version: '3.8'

services:
  app:
    build: ./server
    container_name: video-api
    network_mode: host
    environment:
      - http_proxy=${http_proxy}
      - RTSP_URL=rtsp://${HOST}:8554/cam_main
      - OPENAI_API_BASE=http://${GPU_HOST}:${VLLM_PORT}/v1                                                              # 负载均衡地址
      - MODEL_NAME=Qwen3.6-35B-A3B   # 模型名称
      - INTERVAL_SEC=1                                                                                # 调用API间隔秒数    
      - SAMPLE_FPS=4                                                                                 # 每秒抽几帧
      - REQUIRED_FRAMES=8                                       # 缓冲区大小：存储14帧
      - INFERENCE_FRAMES=4                                       # 每次推理发送前6帧
    volumes:
      - ./server/:/app
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  pipeline:
    build: ./pipeline
    container_name: video-pipeline
    network_mode: host
    privileged: true
    command: ["uv", "run", "pipeline.py", "--fps", "0.3"]
    environment:
      - http_proxy=${http_proxy}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - RTSP_URL=rtsp://127.0.0.1:8554/cam_main
      - RTMP_BASE=rtmp://127.0.0.1:1935/live
      - BLUR_KERNEL=31
      - NOISE_STRENGTH=30
      - PYTHONUNBUFFERED=1
      - GPU_HOST=${GPU_HOST}
      - MAE_PORT=${MAE_PORT}
    volumes:
      - ./pipeline:/app
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  frontend-dev:
    image: node:22
    container_name: video-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    network_mode: host
    environment:
      - VITE_STREAM_URL=http://${HOST}:8889/cam_main/whep
      - VITE_COMBINED_STREAM_URL=http://${HOST}:8889/live/combined/whep
      - VITE_API_HOST=http://${HOST}:28001/api
      - VITE_IS_JETSON=false
      - VITE_QA_DEV_MODE=true
      - VITE_LOAD_DATA_INTERVAL=500
      - VITE_FRESH_INTERVAL=3000
      - VITE_TYPING_DURATION=500
    command: ["/bin/sh", "-c", "npm config set registry https://registry.npmmirror.com && npm install && npm run dev -- --host 0.0.0.0"]
    stdin_open: true
    tty: true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    network_mode: host   # 方便局域网内任何设备直接访问;不需要的话可以改成 ports
    volumes:
      - ./MediaMTX/mediamtx.yml:/mediamtx.yml
      - ./MediaMTX/hls:/hls      # HLS 切片输出目录(可选,留着方便调试)
      - ./MediaMTX/recordings:/recordings  # 录像目录(可选)
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  #     - "1"
  #     - "rtmp://srs:1935/live/livestream"
  #   depends_on:
  #     - srs
  #   restart: unless-stopped
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "50m"
  #       max-file: "3"

  pipeline:
    build: ./pipeline
    container_name: video-pipeline
    network_mode: host
    privileged: true
    command: ["uv", "run", "pipeline.py", "stream", "--fps", "0.3"]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - RTSP_URL=rtsp://127.0.0.1:8554/cam_main
      - RTMP_BASE=rtmp://127.0.0.1:1935/live
      - BLUR_KERNEL=31
      - NOISE_STRENGTH=30
      - PYTHONUNBUFFERED=1
    volumes:
      - ./pipeline:/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  frontend-dev:
    image: node:22
    container_name: video-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    network_mode: host
    environment:
      - VITE_STREAM_URL=http://192.168.151.158:8889/cam_main/whep
      - VITE_COMBINED_STREAM_URL=http://192.168.151.158:8889/live/combined/whep
      - VITE_API_HOST=http://192.168.151.158:28001/api
      - VITE_IS_JETSON=false
      - VITE_QA_DEV_MODE=true
      - VITE_LOAD_DATA_INTERVAL=500
      - VITE_FRESH_INTERVAL=3000
      - VITE_TYPING_DURATION=500
    command: ["/bin/sh", "-c", "npm config set registry https://registry.npmmirror.com && npm install && npm run dev -- --host 0.0.0.0"]
    stdin_open: true
    tty: true
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    network_mode: host   # 方便局域网内任何设备直接访问;不需要的话可以改成 ports
    volumes:
      - ./MediaMTX/mediamtx.yml:/mediamtx.yml
      - ./MediaMTX/hls:/hls      # HLS 切片输出目录(可选,留着方便调试)
      - ./MediaMTX/recordings:/recordings  # 录像目录(可选)

  
